events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server {
        listen 80;
        server_name _;

        location /api {
            proxy_pass http://gateway:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /crm/ {
            rewrite ^/crm/(.*) /$1 break;
            proxy_pass http://espocrm;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location = /crm { return 302 /crm/; }

        location /chat/ {
            rewrite ^/chat/(.*) /$1 break;
            proxy_pass http://chatwoot-rails:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location = /chat { return 302 /chat/; }

        location /waha/ {
            rewrite ^/waha/(.*) /$1 break;
            proxy_pass http://waha:3001;
            proxy_set_header Host $host;
        }
        location = /waha { return 302 /waha/; }

        location /monitor/ {
            rewrite ^/monitor/(.*) /$1 break;
            proxy_pass http://uptime-kuma:3001;
            proxy_set_header Host $host;
        }
        location = /monitor { return 302 /monitor/; }
    }
}
